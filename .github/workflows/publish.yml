name: Publish To PyPI

on:
  release:
    types:
      - published
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    # mhcmatch is pure Python (hatchling) -> one sdist + one universal wheel via `build`.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install build tooling
        run: python -m pip install --upgrade pip build twine
      - name: Regenerate vendored MHC models for this release
        # The vendored AnchorModels are version-guarded (a model built under an older version is
        # ignored at runtime and rebuilt, ~200 s). Rebuild them here so the PUBLISHED wheel can never
        # ship stale models: install the package (editable, so the regen writes into src/mhcmatch/data
        # that `build` then packages), then fit on the public isalgo/pmhc_data full-tier panel
        # (auto-fetched from HF). ~5 min. A build hook cannot do this -- `python -m build` runs in an
        # isolated env without numpy/seqtree/the panel. ci.yml's staleness test is the earlier guard.
        run: |
          pip install -e ".[test]"
          python tools/build_anchor_models.py
          git diff --stat -- src/mhcmatch/data/ || true
      - name: Build sdist + wheel
        run: python -m build
      - name: Check distributions
        run: python -m twine check dist/*
      - name: Upload distributions
        uses: actions/upload-artifact@v4
        with:
          name: python-dist
          path: dist/

  smoke:
    name: Smoke-test wheel (py${{ matrix.python-version }})
    needs: build
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.12"]
    steps:
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - uses: actions/download-artifact@v4
        with:
          name: python-dist
          path: dist/
      - name: Install built wheel (deps incl. seqtree resolved from PyPI)
        run: |
          pip install --upgrade pip
          pip install dist/*.whl
      - name: Import mhcmatch
        run: python -c "import mhcmatch; print('[OK] mhcmatch', mhcmatch.__version__)"

  publish:
    name: Publish To PyPI
    needs: [build, smoke]
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      contents: read
      id-token: write  # required for OIDC trusted publishing
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: python-dist
          path: dist/
      - name: Validate package version matches release tag
        if: github.event_name == 'release'
        run: |
          python - <<'PY'
          from pathlib import Path
          import tomllib
          version = tomllib.loads(Path("pyproject.toml").read_text())["project"]["version"]
          tag = "${{ github.event.release.tag_name }}"
          norm = tag[1:] if tag.startswith("v") else tag
          if version != norm:
              raise SystemExit(f"Version mismatch: pyproject.toml={version}, tag={tag}")
          print(f"Version check passed: {version} == {tag}")
          PY
      - name: List distributions
        run: ls -R dist/
      - name: Publish distributions to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
